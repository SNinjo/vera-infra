apiVersion: apps/v1
kind: Deployment
metadata:
  name: vera-identity
  namespace: vera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vera-identity
  template:
    metadata:
      labels:
        app: vera-identity
    spec:
      containers:
        - name: identity
          image: harbor.local/vera/vera-identity:v1.0.0
          envFrom:
            - configMapRef:
                name: vera-identity
      imagePullSecrets:
        - name: harbor-pull
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
          scheme: HTTP
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
